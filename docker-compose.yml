services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mcms
      POSTGRES_USER: mcms
      POSTGRES_PASSWORD: mcms
    ports:
      - "5432:5432"
    volumes:
      - mcms-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcms -d mcms"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ./server
    environment:
      DATABASE_URL: postgresql://mcms:mcms@db:5432/mcms?schema=public
      JWT_ACCESS_SECRET: docker-access-secret-change-me
      JWT_REFRESH_SECRET: docker-refresh-secret-change-me
      CLIENT_ORIGIN: http://localhost:5173
      PORT: 4000
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:4000"
    command: sh -c "npx prisma migrate deploy && npm run seed && node dist/index.js"

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: http://localhost:4000/api
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  mcms-postgres:
